<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup Pool 2026</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:20px auto;
  padding:15px;
}

input{
  padding:12px;
  width:100%;
  max-width:350px;
  box-sizing:border-box;
}

button{
  padding:12px;
  margin:4px;
  cursor:pointer;
  min-height:44px;
}

.match{
  border:1px solid #ddd;
  border-radius:8px;
  padding:16px;
  margin-bottom:12px;
  background:white;
}
  .selected{
  background:#4CAF50;
  color:white;
  font-weight:bold;
}
  @media (max-width: 600px) {

  .match button{
    display:block;
    width:100%;
    margin:6px 0;
  }

}
</style>

</head>
<body>

<h1 style="text-align:center;">
🏆 World Cup Pool 2026
</h1>

<input id="playerName" placeholder="Enter your name">
<button onclick="saveName()">Join Pool</button>

<p id="welcome"></p>

<hr>

<div style="margin-bottom:20px;">
  <button onclick="showPredictions()">
    🏆 Predictions
  </button>

  <button onclick="showOdds()">
    🎯 Odds
  </button>

  <button onclick="showLeaderboard()">
    🏅 Leaderboard
  </button>

   <button onclick="showHistory()">
    📜 History
  </button>
  <button onclick="showWinner()">
🌍 Winner
</button>
</div>

<div id="content">
Loading...
</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzIebnW6eTT_70hHM1HEY5v8NEIg2PC2s7KRfqiqtFmlZZetfezR-t3FYW9YfqVeHQz/exec";

  let appData = null;
  console.log(GOOGLE_SCRIPT_URL);

async function saveName(){

 const name =
  document.getElementById("playerName")
    .value
    .trim()
  .toLowerCase();

if(!name){
  alert("Please enter your name");
  return;
}

  localStorage.setItem("playerName",name);

  document.getElementById("welcome")
    .innerText =
    "Welcome " + name;

  await fetch(
    GOOGLE_SCRIPT_URL,
    {
      method:"POST",
      body:JSON.stringify({
        action:"addPlayer",
        name:name
      })
    }
  );
}
async function pickMatch(matchId,pick,button){

  const player =
    localStorage.getItem("playerName");

  if(!player){
    alert("Enter your name first");
    return;
  }
const parent = button.parentElement;

parent.querySelectorAll("button").forEach(btn=>{
  btn.classList.remove("selected");
});

button.classList.add("selected");
  try{

    const response = await fetch(
      GOOGLE_SCRIPT_URL,
      {
        method:"POST",
        body:JSON.stringify({
          action:"savePick",
          player:player,
          matchId:matchId,
          pick:pick
        })
      }
    );

    const result = await response.text();

    console.log(result);

await loadData();

  }catch(err){

    console.error(err);

    alert("Save failed. Check console.");

  }
}

async function loadData(){

  const response =
    await fetch(
      GOOGLE_SCRIPT_URL + "?action=load"
    );

  appData =
    await response.json();

}
  
async function loadMatches(){

  const data = appData;

  const container =
  document.getElementById("content");

  container.innerHTML = "";
  const player =
  localStorage.getItem("playerName");

const playerPredictions =
  player && data.predictions[player]
    ? data.predictions[player]
    : {};

  Object.keys(data.matches).forEach(id => {

    const match = data.matches[id];

    const div =
      document.createElement("div");

    div.className = "match";

const selectedPick =
  playerPredictions[id];

const matchDate = new Date(match.date);

const lockTime = new Date(matchDate);

lockTime.setHours(9,0,0,0);
    
const locked =
  new Date() >= lockTime;

if (locked) {
  return;
}
    
div.innerHTML = `
  <strong>${match.home}</strong>
  vs
  <strong>${match.away}</strong>
  <br>
${new Date(match.date).toLocaleDateString(
  "en-GB",
  {
    day: "numeric",
    month: "long"
  }
)}



  <br><br>

  <button
     ${locked ? "disabled" : ""}
  class="${selectedPick === match.home ? 'selected' : ''}"
  onclick="pickMatch('${id}','${match.home}', this)">
    ${match.home}
  </button>

  <button
     ${locked ? "disabled" : ""}
  class="${selectedPick === 'Draw' ? 'selected' : ''}"
  onclick="pickMatch('${id}','Draw', this)">
    Draw
  </button>

  <button
  ${locked ? "disabled" : ""}
  class="${selectedPick === match.away ? 'selected' : ''}"
  onclick="pickMatch('${id}','${match.away}', this)">
    ${match.away}
  </button>
`;
    container.appendChild(div);

  });

}

const savedName =
  localStorage.getItem("playerName");

if(savedName){

  document.getElementById("playerName").value =
    savedName;

  document.getElementById("welcome")
    .innerText =
    "Welcome " + savedName;
}


  function showPredictions(){
  loadMatches();
}

function showOdds(){

  const data = appData;

  const container =
    document.getElementById("content");

 let html = `
  <div style="
    max-height:70vh;
    overflow-y:auto;
  ">
  <table style="
    width:100%;
    border-collapse:collapse;
  ">
`;
    html += `
<tr>

  <th style="
    position:sticky;
    top:0;
    background:white;
    z-index:10;
    text-align:left;
    padding:10px;
    border-bottom:1px solid #ddd;
  ">
    Match
  </th>

  <th style="
    position:sticky;
    top:0;
    background:white;
    z-index:10;
    padding:10px;
    border-bottom:1px solid #ddd;
  ">
    Home
  </th>

  <th style="
    position:sticky;
    top:0;
    background:white;
    z-index:10;
    padding:10px;
    border-bottom:1px solid #ddd;
  ">
    Away
  </th>

  <th style="
    position:sticky;
    top:0;
    background:white;
    z-index:10;
    padding:10px;
    border-bottom:1px solid #ddd;
  ">
    Draw
  </th>

</tr>
`;


  data.odds.forEach(row => {
const matchDate = new Date(row[1]);

const today = new Date();

today.setHours(0,0,0,0);

matchDate.setHours(0,0,0,0);

if(matchDate < today){
  return;
}
    const date = new Date(row[1]).toLocaleDateString(
  "en-GB",
  {
    day: "numeric",
    month: "long"
  }
);
    const homeTeam = row[2];
    const homeOdds = row[3].toFixed(3);
    const awayTeam = row[4];
    const awayOdds = row[5].toFixed(3);
    const drawOdds = row[7].toFixed(3);

    html += `
      <tr>
        <td style="padding:10px;border-bottom:1px solid #eee;">
          ${homeTeam} vs ${awayTeam}
          <br>
          <small>${date}</small>
        </td>

        <td style="text-align:center;">
          ${homeOdds}
        </td>

        <td style="text-align:center;">
          ${awayOdds}
        </td>

        <td style="text-align:center;">
          ${drawOdds}
        </td>
      </tr>
    `;
  });

html += "</table></div>";
  container.innerHTML = html;
}
function showHistory(){

  const data = appData;

  const container =
    document.getElementById("content");

  container.innerHTML = "";

  const player =
    localStorage.getItem("playerName");

  if(!player){

    container.innerHTML =
      "Enter your name first.";

    return;
  }

  const playerPredictions =
    data.predictions[player] || {};

  Object.keys(data.matches).forEach(id => {

    const match =
      data.matches[id];

    const matchDate =
      new Date(match.date);

    const lockTime =
      new Date(matchDate);

    lockTime.setHours(9,0,0,0);

    const locked =
      new Date() >= lockTime;

    if(!locked){
      return;
    }

    const pick =
      playerPredictions[id] || "-";

    const div =
      document.createElement("div");

    div.className = "match";

    div.innerHTML = `
      <strong>
        ${match.home} vs ${match.away}
      </strong>
      <br>

      ${new Date(match.date).toLocaleDateString(
        "en-GB",
        {
          day:"numeric",
          month:"long"
        }
      )}

      <br><br>

      Your Pick:
      <strong>${pick}</strong>
    `;

    container.appendChild(div);

  });

}
function showLeaderboard(){

  const data = appData;

  const container =
    document.getElementById("content");

  const leaderboard =
    [...data.scorecard];

  leaderboard.sort(
    (a,b) => Number(b[1]) - Number(a[1])
  );

  let html = `
    <table style="
      width:100%;
      border-collapse:collapse;
    ">
      <tr>
        <th style="padding:10px;text-align:left;">
          Rank
        </th>
        <th style="padding:10px;text-align:left;">
          Player
        </th>
        <th style="padding:10px;text-align:right;">
          Points
        </th>
      </tr>

`;
  leaderboard.forEach((row,index)=>{

    let medal = index + 1;

    if(index === 0) medal = "🥇";
    if(index === 1) medal = "🥈";
    if(index === 2) medal = "🥉";

    html += `
      <tr>
        <td style="
          padding:10px;
          border-top:1px solid #eee;
        ">
          ${medal}
        </td>

        <td style="
          padding:10px;
          border-top:1px solid #eee;
        ">
          ${row[0]}
        </td>

        <td style="
          padding:10px;
          text-align:right;
          border-top:1px solid #eee;
        ">
          ${Number(row[1]).toFixed(3)}
        </td>
      </tr>
    `;
  });

  html += "</table>";

  container.innerHTML = html;
}

const teams = [

"Argentina",
"Australia",
"Austria",
"Belgium",
"Bosnia and Herzegovina",
"Brazil",
"Canada",
"Cape Verde",
"Colombia",
"Croatia",
"DR Congo",
"Ecuador",
"Egypt",
"England",
"France",
"Germany",
"Ghana",
"Iran",
"Iraq",
"Ivory Coast",
"Japan",
"Mexico",
"Morocco",
"Netherlands",
"Norway",
"Paraguay",
"Portugal",
"Saudi Arabia",
"Scotland",
"Senegal",
"South Africa",
"South Korea",
"Spain",
"Sweden",
"Switzerland",
"United States",
"Uruguay",
"Uzbekistan"

];
function showWinner(){

  const container =
    document.getElementById("content");

  const player =
    localStorage.getItem("playerName");

  if(!player){

    container.innerHTML =
      "Enter your name first.";

    return;

  }

  const selectedTeam =
    appData.winnerPredictions[player];

  const lockTime =
    new Date(2026,6,6,9,0,0);

  const locked =
    new Date() >= lockTime;

  let html = `

<h2>🌍 World Cup Winner</h2>

<p>
Choose who you think will win the World Cup.
<br>
Predictions close on
<b>4 July 2026 at 09:00 Berlin time.</b>
</p>

`;

  html += `
<br>

<select
    id="winnerTeam"
    style="
        width:100%;
        max-width:400px;
        padding:12px;
        font-size:16px;
    "
    ${locked ? "disabled" : ""}
>

<option value="">
Select a team
</option>
`;

teams.forEach(team=>{

    html += `
        <option
            value="${team}"
            ${selectedTeam===team ? "selected" : ""}
        >
            ${team}
        </option>
    `;

});

html += `
</select>
`;
  if(!locked){

html += `

<br><br>

<button
    onclick="saveWinner()"
    style="
        padding:12px 20px;
        font-size:16px;
    "
>
💾 Save Winner
</button>

`;

}

  container.innerHTML = html;

}
async function saveWinner(){

  const player =
    localStorage.getItem("playerName");

  if(!player){
    alert("Enter your name first");
    return;
  }

  const team =
    document.getElementById("winnerTeam").value;

  if(!team){
    alert("Please select a team.");
    return;
  }

  try{

    const response = await fetch(
      GOOGLE_SCRIPT_URL,
      {
        method:"POST",
        body:JSON.stringify({
          action:"saveWinner",
          player:player,
          team:team
        })
      }
    );

    const result = await response.text();

    console.log(result);

    await loadData();

    alert("✅ Winner prediction saved!");

  }catch(err){

    console.error(err);

    alert("Save failed. Check console.");

  }

}
  
async function startApp(){

  await loadData();

  loadMatches();

}

startApp();

</script>

</body>
</html>
