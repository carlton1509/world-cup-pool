<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup Pool 2026</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:20px auto;
  padding:20px;
}

input{
  padding:10px;
  width:250px;
}

button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}

.match{
  border:1px solid #ddd;
  border-radius:8px;
  padding:12px;
  margin-bottom:10px;
}
  .selected{
  background:#4CAF50;
  color:white;
}
  
</style>

</head>
<body>

<h1>🏆 World Cup Pool 2026</h1>

<input id="playerName" placeholder="Enter your name">
<button onclick="saveName()">Join Pool</button>

<p id="welcome"></p>

<hr>

<div id="matches">
Loading matches...
</div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzIebnW6eTT_70hHM1HEY5v8NEIg2PC2s7KRfqiqtFmlZZetfezR-t3FYW9YfqVeHQz/exec";

  console.log(GOOGLE_SCRIPT_URL);

function saveName(){

  const name =
    document.getElementById("playerName").value;

  localStorage.setItem("playerName",name);

  document.getElementById("welcome")
    .innerText =
    "Welcome " + name;
}

async function pickMatch(matchId,pick){

  const player =
    localStorage.getItem("playerName");

  if(!player){
    alert("Enter your name first");
    return;
  }

  try{

    const response = await fetch(
      GOOGLE_SCRIPT_URL,
      {
        method:"POST",
        body:JSON.stringify({
          action:"savePick",
          player:player,
          matchId:matchId,
          pick:pick
        })
      }
    );

    const result = await response.text();

    console.log(result);

alert("Saved: " + pick);

loadMatches();

  }catch(err){

    console.error(err);

    alert("Save failed. Check console.");

  }
}
async function loadMatches(){

  const response =
    await fetch(
      GOOGLE_SCRIPT_URL + "?action=load"
    );

  const data =
    await response.json();

  const container =
    document.getElementById("matches");

  container.innerHTML = "";
  const player =
  localStorage.getItem("playerName");

const playerPredictions =
  player && data.predictions[player]
    ? data.predictions[player]
    : {};

  Object.keys(data.matches).forEach(id => {

    const match = data.matches[id];

    const div =
      document.createElement("div");

    div.className = "match";

const selectedPick =
  playerPredictions[id];

div.innerHTML = `
  <strong>${match.home}</strong>
  vs
  <strong>${match.away}</strong>
  <br>
 ${new Date(match.date).toLocaleDateString(
  "en-GB",
  {
    day: "numeric",
    month: "long"
  }
)}
  <br><br>

  <button
    class="${selectedPick === match.home ? 'selected' : ''}"
    onclick="pickMatch('${id}','${match.home}')">
    ${match.home}
  </button>

  <button
    class="${selectedPick === 'Draw' ? 'selected' : ''}"
    onclick="pickMatch('${id}','Draw')">
    Draw
  </button>

  <button
    class="${selectedPick === match.away ? 'selected' : ''}"
    onclick="pickMatch('${id}','${match.away}')">
    ${match.away}
  </button>
`;
    container.appendChild(div);

  });

}

const savedName =
  localStorage.getItem("playerName");

if(savedName){

  document.getElementById("playerName").value =
    savedName;

  document.getElementById("welcome")
    .innerText =
    "Welcome " + savedName;
}

loadMatches();

</script>

</body>
</html>
